<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Лента (Firestore onSnapshot)</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#f4f7f6; margin:0; display:flex; flex-direction:column; align-items:center; padding:20px; }
    .container { width:100%; max-width:520px; background:#fff; padding:22px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,.08); }
    h3 { margin:0 0 12px; }
    input { width: 320px; max-width: 100%; padding: 12px; margin: 8px auto; display: block; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;}
    button { width: 320px; max-width: 100%; padding: 12px; margin: 10px auto 0; display: block; border: 0; border-radius: 8px; background: #007bff; color: #fff; font-weight: 600; cursor: pointer;}
    button:disabled { opacity:.6; cursor:not-allowed; }
    .hint { margin-top:10px; font-size:12px; color:#6b7280; min-height:16px; }
    #feed { width:100%; max-width:520px; margin-top:14px; }
    .post { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:12px; margin:10px 0; }
    .meta { display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .time { font-size:12px; color:#999; }
    .id { font-size:11px; color:#6b7280; margin-top:6px; word-break: break-all; }
    .actions { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
    .like-btn, .dislike-btn {
      background:#e2e6ea; color:#111; border:0; padding:8px 12px; border-radius:8px; cursor:pointer; width:auto;
    }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; }
    .conn { font-size:12px; color:#6b7280; }
    .small { font-size:12px; color:#6b7280; margin:8px 0 0; }
  </style>
</head>
<body>

  <div class="container">
    <div class="topbar">
      <h3>Панель управления данными</h3>
      <div class="conn" id="connStatus">Подключение…</div>
    </div>

    <input type="text" id="name" placeholder="Имя профиля" />
    <input type="email" id="email" placeholder="Рабочий Email" />
    <input type="password" id="password" placeholder="Пароль (мин. 6 символов)" />

    <button id="mainBtn">Зарегистрироваться и опубликовать</button>
    <div class="hint" id="status"></div>

  <div id="feed"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      doc,
      updateDoc,
      increment,
      deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBU8S2jzUmbiPLHUe5d4GjW6ZhvfiX4BQ4",
      authDomain: "qwerty-889bc.firebaseapp.com",
      projectId: "qwerty-889bc",
      storageBucket: "qwerty-889bc.firebasestorage.app",
      messagingSenderId: "899241468202",
      appId: "1:899241468202:web:f2f0cf7c0fa36414427e53",
      measurementId: "G-25RLR6EB83"
    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app, "aleoy");

    const auth = getAuth(app);

    const colRef = collection(db, "requests");

    const feed = document.getElementById("feed");
    const statusEl = document.getElementById("status");
    const connEl = document.getElementById("connStatus");

    const nameEl = document.getElementById("name");
    const emailEl = document.getElementById("email");
    const passEl = document.getElementById("password");
    const mainBtn = document.getElementById("mainBtn");

    const setStatus = (msg) => { statusEl.textContent = msg || ""; };

    mainBtn.addEventListener("click", async () => {
      const name = nameEl.value.trim();
      const email = emailEl.value.trim().toLowerCase();
      const password = passEl.value;

      if (name.length < 3) return setStatus("Имя должно быть минимум 3 символа.");
      if (!email.includes("@")) return setStatus("Проверь email.");
      if (!password || password.length < 6) return setStatus("Пароль минимум 6 символов.");

      mainBtn.disabled = true;
      setStatus("Регистрация/вход...");

      try {
        try {
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          await updateProfile(cred.user, { displayName: name });
        } catch (e) {
          if (e.code === "auth/email-already-in-use") {
            await signInWithEmailAndPassword(auth, email, password);
          } else {
            throw e;
          }
        }

        setStatus("Публикация в Firestore...");

        const uid = auth.currentUser?.uid ?? null;

        const docRef = await addDoc(colRef, {
          name,
          email,
          uid,
          likes: 0,
          dislikes: 0,
          timestamp: serverTimestamp()
        });

        nameEl.value = "";
        emailEl.value = "";
        passEl.value = "";
        setStatus("Сохранено ✅ id: " + docRef.id);
      } catch (e) {
        console.error(e);
        setStatus("Ошибка: " + (e.message || e.code));
      } finally {
        mainBtn.disabled = false;
      }
    });

    const q = query(colRef, orderBy("timestamp", "desc"));

    onSnapshot(
      q,
      { includeMetadataChanges: true },
      (snapshot) => {
        connEl.textContent = snapshot.metadata.fromCache ? "Оффлайн/кэш" : "Онлайн (live)";
        feed.innerHTML = "";

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();

          const card = document.createElement("div");
          card.className = "post";

          const meta = document.createElement("div");
          meta.className = "meta";

          const left = document.createElement("div");
          left.innerHTML = `<b>${data.name ?? "(без имени)"}</b><br>${data.email ?? "(без email)"}`;

          const time = document.createElement("div");
          time.className = "time";
          time.textContent = data.timestamp?.toDate ? data.timestamp.toDate().toLocaleString() : "…";

          meta.appendChild(left);
          meta.appendChild(time);

          const idLine = document.createElement("div");
          idLine.className = "id";
          idLine.textContent = "ID: " + docSnap.id;

          const actions = document.createElement("div");
          actions.className = "actions";

          const likeBtn = document.createElement("button");
          likeBtn.className = "like-btn";
          likeBtn.dataset.id = docSnap.id;
          likeBtn.textContent = `👍 ${data.likes ?? 0}`;

          const dislikeBtn = document.createElement("button");
          dislikeBtn.className = "dislike-btn";
          dislikeBtn.dataset.id = docSnap.id;
          dislikeBtn.textContent = `👎 ${data.dislikes ?? 0}`;

          actions.appendChild(likeBtn);
          actions.appendChild(dislikeBtn);

          card.appendChild(meta);
          card.appendChild(idLine);
          card.appendChild(actions);

          feed.appendChild(card);
        });
      },
      (error) => {
        console.error(error);
        setStatus("Ошибка подписки (onSnapshot): " + error.message);
      }
    );

    feed.addEventListener("click", async (e) => {
      const like = e.target.closest(".like-btn");
      const dislike = e.target.closest(".dislike-btn");
      if (!like && !dislike) return;

      const id = (like || dislike).dataset.id;
      const ref = doc(db, "requests", id);

      try {
        if (like) {
          await updateDoc(ref, { likes: increment(1) });
        } else {
          await updateDoc(ref, { dislikes: increment(1) });
        }
      } catch (err) {
        console.error(err);
        alert("Отклонено сервером (Rules): " + err.message);
      }
    });

    window.tryDelete = async (id) => deleteDoc(doc(db, "requests", id));
    window.tryEdit = async (id) => updateDoc(doc(db, "requests", id), { name: "HACKED" });

    console.log("Ready. Tests: tryDelete('ID'), tryEdit('ID')");
  </script>

</body>
</html>
