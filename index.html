<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DM (Firebase)</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:#f3f4f6; padding:20px; display:grid; place-items:center; }
    .wrap { width:100%; max-width:980px; display:grid; gap:14px; }
    .card { background:#fff; border-radius:14px; padding:16px; box-shadow:0 12px 30px rgba(0,0,0,.10); }
    h2 { margin:0 0 10px; font-size:18px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input { padding:10px 12px; border:1px solid #d1d5db; border-radius:10px; outline:none; width:320px; max-width:100%; }
    input:focus { border-color:#2563eb; box-shadow:0 0 0 4px rgba(37,99,235,.15); }
    button { padding:10px 12px; border:0; border-radius:10px; background:#2563eb; color:#fff; cursor:pointer; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .muted { color:#6b7280; font-size:12px; min-height:16px; }
    .grid { display:grid; grid-template-columns: 320px 1fr; gap:14px; }
    .list { display:grid; gap:8px; }
    .item { padding:10px; border:1px solid #e5e7eb; border-radius:12px; cursor:pointer; }
    .item:hover { background:#f9fafb; }
    .item b { display:block; }
    .chat { display:grid; gap:10px; }
    .msgs { height:360px; overflow:auto; border:1px solid #e5e7eb; border-radius:12px; padding:10px; background:#fff; }
    .msg { margin:6px 0; padding:8px 10px; border-radius:12px; max-width:80%; }
    .me { background:#dbeafe; margin-left:auto; }
    .them { background:#f3f4f6; margin-right:auto; }
    .msg small { display:block; color:#6b7280; margin-top:4px; font-size:11px; }
    .topline { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .badge { font-size:12px; color:#6b7280; }
    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card">
      <div class="topline">
        <h2>Аккаунт</h2>
        <div class="badge" id="conn">—</div>
      </div>

      <div class="row">
        <input id="name" placeholder="Имя (для профиля)" />
        <input id="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Пароль (мин. 6)" />
        <button id="btnRegister">Регистрация</button>
        <button id="btnLogin">Вход</button>
        <button id="btnLogout" disabled>Выход</button>
      </div>
      <div class="muted" id="authStatus"></div>
    </div>

    <div class="card" id="dmCard" style="display:none;">
      <div class="topline">
        <h2>Личные сообщения (DM)</h2>
        <div class="badge" id="meBadge">—</div>
      </div>

      <div class="grid">
        <!-- LEFT -->
        <div>
          <div class="row">
            <input id="peerEmail" placeholder="Email собеседника" />
            <button id="btnOpen">Открыть чат</button>
          </div>
          <div class="muted" id="dmStatus"></div>

          <h2 style="margin-top:14px;">Диалоги</h2>
          <div class="list" id="convs"></div>
        </div>

        <div class="chat">
          <div class="topline">
            <div>
              <b id="chatTitle">Чат не выбран</b>
              <div class="muted" id="chatSub"></div>
            </div>
          </div>

          <div class="msgs" id="msgs"></div>

          <div class="row">
            <input id="text" placeholder="Сообщение..." style="flex:1; width:auto; min-width:240px;" />
            <button id="btnSend" disabled>Отправить</button>
          </div>
          <div class="muted">Тест: открой в двух браузерах — сообщения/обновления появятся сразу.</div>
        </div>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getFirestore, doc, setDoc, getDoc, updateDoc,
      collection, addDoc, query, where, orderBy, onSnapshot,
      serverTimestamp, limit
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    import {
      getAuth, onAuthStateChanged, createUserWithEmailAndPassword,
      signInWithEmailAndPassword, signOut, updateProfile
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBU8S2jzUmbiPLHUe5d4GjW6ZhvfiX4BQ4",
      authDomain: "qwerty-889bc.firebaseapp.com",
      projectId: "qwerty-889bc",
      storageBucket: "qwerty-889bc.firebasestorage.app",
      messagingSenderId: "899241468202",
      appId: "1:899241468202:web:f2f0cf7c0fa36414427e53",
      measurementId: "G-25RLR6EB83"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app, "aleoy");
    const auth = getAuth(app);

    const el = (id) => document.getElementById(id);
    const authStatus = el("authStatus");
    const dmStatus = el("dmStatus");
    const dmCard = el("dmCard");
    const convsEl = el("convs");
    const msgsEl = el("msgs");
    const chatTitle = el("chatTitle");
    const chatSub = el("chatSub");
    const meBadge = el("meBadge");
    const conn = el("conn");

    const btnRegister = el("btnRegister");
    const btnLogin = el("btnLogin");
    const btnLogout = el("btnLogout");
    const btnOpen = el("btnOpen");
    const btnSend = el("btnSend");

    const nameEl = el("name");
    const emailEl = el("email");
    const passEl = el("password");
    const peerEmailEl = el("peerEmail");
    const textEl = el("text");

    let me = null;
    let activeConvId = null;
    let activePeerUid = null;
    let unsubConvs = null;
    let unsubMsgs = null;

    const uidPairId = (a, b) => [a, b].sort().join("_");

    function setText(node, text) { node.textContent = text || ""; }

    btnRegister.onclick = async () => {
      const name = nameEl.value.trim();
      const email = emailEl.value.trim().toLowerCase();
      const pass = passEl.value;

      if (name.length < 2) return setText(authStatus, "Имя слишком короткое.");
      if (!email.includes("@")) return setText(authStatus, "Проверь email.");
      if (!pass || pass.length < 6) return setText(authStatus, "Пароль минимум 6 символов.");

      setText(authStatus, "Регистрация...");
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });

        await setDoc(doc(db, "users", cred.user.uid), {
          email,
          name,
          createdAt: serverTimestamp()
        }, { merge: true });

        setText(authStatus, "Готово ✅");
      } catch (e) {
        console.error(e);
        setText(authStatus, "Ошибка: " + (e.code || e.message));
      }
    };

    btnLogin.onclick = async () => {
      const email = emailEl.value.trim().toLowerCase();
      const pass = passEl.value;
      setText(authStatus, "Вход...");
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        setText(authStatus, "Вошли ✅");
      } catch (e) {
        console.error(e);
        setText(authStatus, "Ошибка: " + (e.code || e.message));
      }
    };

    btnLogout.onclick = async () => {
      await signOut(auth);
    };

    onAuthStateChanged(auth, async (user) => {
      me = user || null;

      if (unsubConvs) unsubConvs();
      if (unsubMsgs) unsubMsgs();
      unsubConvs = null; unsubMsgs = null;
      activeConvId = null; activePeerUid = null;
      msgsEl.innerHTML = "";
      convsEl.innerHTML = "";
      btnSend.disabled = true;

      if (!me) {
        dmCard.style.display = "none";
        btnLogout.disabled = true;
        setText(meBadge, "—");
        setText(conn, "Вы не вошли");
        setText(chatTitle, "Чат не выбран");
        setText(chatSub, "");
        return;
      }

      dmCard.style.display = "";
      btnLogout.disabled = false;
      setText(meBadge, `Вы: ${me.email}`);
      setText(conn, "Онлайн");

      await setDoc(doc(db, "users", me.uid), {
        email: me.email,
        name: me.displayName || "",
        createdAt: serverTimestamp()
      }, { merge: true });

      const convQ = query(
        collection(db, "conversations"),
        where("participants", "array-contains", me.uid),
        orderBy("updatedAt", "desc"),
        limit(50)
      );

      unsubConvs = onSnapshot(convQ, async (snap) => {
        convsEl.innerHTML = "";
        setText(dmStatus, "");

        if (snap.empty) {
          convsEl.innerHTML = `<div class="muted">Диалогов пока нет</div>`;
          return;
        }

        for (const d of snap.docs) {
          const data = d.data();
          const otherUid = (data.participants || []).find(x => x !== me.uid);
          let label = otherUid || "unknown";

          if (otherUid) {
            const uDoc = await getDoc(doc(db, "users", otherUid));
            if (uDoc.exists()) {
              const u = uDoc.data();
              label = `${u.name || "(без имени)"} — ${u.email || otherUid}`;
            }
          }

          const div = document.createElement("div");
          div.className = "item";
          div.innerHTML = `<b>${label}</b><div class="muted">${data.lastMessage || ""}</div>`;
          div.onclick = () => openConversationById(d.id);
          convsEl.appendChild(div);
        }
      });
    });

    btnOpen.onclick = async () => {
      if (!me) return;

      const email = peerEmailEl.value.trim().toLowerCase();
      if (!email.includes("@")) return setText(dmStatus, "Введи email собеседника.");

      setText(dmStatus, "Поиск пользователя...");
      try {
        const uQ = query(collection(db, "users"), where("email", "==", email), limit(1));

        let resolved = false;
        const unsub = onSnapshot(uQ, async (snap) => {
          if (resolved) return;
          resolved = true;
          unsub();

          if (snap.empty) return setText(dmStatus, "Пользователь не найден (он должен зарегистрироваться).");

          const peerDoc = snap.docs[0];
          const peerUid = peerDoc.id;
          if (peerUid === me.uid) return setText(dmStatus, "Нельзя писать самому себе.");

          const convId = uidPairId(me.uid, peerUid);
          const convRef = doc(db, "conversations", convId);

          const convSnap = await getDoc(convRef);
          if (!convSnap.exists()) {
            await setDoc(convRef, {
              participants: [me.uid, peerUid],
              updatedAt: serverTimestamp(),
              lastMessage: ""
            });
          }

          setText(dmStatus, "Чат открыт ✅");
          await openConversationById(convId);
        });

      } catch (e) {
        console.error(e);
        setText(dmStatus, "Ошибка: " + (e.code || e.message));
      }
    };

    async function openConversationById(convId) {
      if (!me) return;

      activeConvId = convId;
      setText(chatTitle, "Чат: " + convId);
      setText(chatSub, "");
      msgsEl.innerHTML = "";
      btnSend.disabled = false;

      if (unsubMsgs) unsubMsgs();

      const convRef = doc(db, "conversations", convId);
      const convSnap = await getDoc(convRef);
      if (!convSnap.exists()) {
        setText(chatSub, "Чат не найден");
        btnSend.disabled = true;
        return;
      }

      const conv = convSnap.data();
      const peerUid = (conv.participants || []).find(x => x !== me.uid) || null;
      activePeerUid = peerUid;

      if (peerUid) {
        const u = await getDoc(doc(db, "users", peerUid));
        if (u.exists()) {
          const ud = u.data();
          setText(chatTitle, ud.name ? `Чат с: ${ud.name}` : "Чат");
          setText(chatSub, ud.email || peerUid);
        }
      }

      const msgQ = query(
        collection(db, "conversations", convId, "messages"),
        orderBy("createdAt", "asc"),
        limit(200)
      );

      unsubMsgs = onSnapshot(msgQ, (snap) => {
        msgsEl.innerHTML = "";
        snap.forEach((m) => {
          const data = m.data();
          const div = document.createElement("div");
          div.className = "msg " + (data.from === me.uid ? "me" : "them");
          div.textContent = data.text || "";
          const t = document.createElement("small");
          t.textContent = data.createdAt?.toDate ? data.createdAt.toDate().toLocaleString() : "…";
          div.appendChild(t);
          msgsEl.appendChild(div);
        });
        msgsEl.scrollTop = msgsEl.scrollHeight;
      });
    }

    btnSend.onclick = async () => {
      if (!me || !activeConvId || !activePeerUid) return;

      const text = textEl.value.trim();
      if (!text) return;

      btnSend.disabled = true;
      try {
        await addDoc(collection(db, "conversations", activeConvId, "messages"), {
          from: me.uid,
          to: activePeerUid,
          text,
          createdAt: serverTimestamp()
        });

        await updateDoc(doc(db, "conversations", activeConvId), {
          updatedAt: serverTimestamp(),
          lastMessage: text
        });

        textEl.value = "";
      } catch (e) {
        console.error(e);
        alert("Ошибка отправки (Rules?): " + (e.code || e.message));
      } finally {
        btnSend.disabled = false;
      }
    };

    window.tryDeleteConversation = async (convId) => {
      const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js");
      return deleteDoc(doc(db, "conversations", convId));
    };
    window.tryEditConversation = async (convId) => updateDoc(doc(db, "conversations", convId), { lastMessage: "HACKED" });
  </script>
</body>
</html>
