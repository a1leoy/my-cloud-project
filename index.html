```html
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Регистрация</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;           /* центр по горизонтали и вертикали */
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }

    .card h1 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: #111827;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }

    button {
      margin-top: 6px;
      padding: 10px 12px;
      font-size: 15px;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      filter: brightness(0.95);
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Регистрация</h1>

    <form action="#" method="post">
      <label>
        Имя
        <input type="text" name="name" placeholder="Введите имя" required />
      </label>

      <label>
        Email
        <input type="email" name="email" placeholder="example@mail.com" required />
      </label>

      <button type="submit">Зарегистрироваться</button>
    </form>

    <div class="hint">Заполните поля и нажмите кнопку.</div>
  </div>

</body>
</html>
```
