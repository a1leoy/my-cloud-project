<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Регистрация</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }
    .card h1 {
      margin: 0 0 14px;
      font-size: 22px;
    }
    form {
      display: grid;
      gap: 12px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: #111827;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      transition: 0.2s;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }
    button {
      margin-top: 6px;
      padding: 10px 12px;
      font-size: 15px;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { filter: brightness(0.95); }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
    }
    #status {
      margin: 6px 0 0;
      font-size: 12px;
      color: #374151;
      min-height: 16px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Регистрация</h1>
    
    <form id="regForm">
      <label>
        Имя
        <input type="text" name="name" placeholder="Введите имя" required />
      </label>

      <label>
        Email
        <input type="email" name="email" placeholder="example@mail.com" required />
      </label>

      <button type="submit">Зарегистрироваться</button>
      <p id="status"></p>
    </form>

    <div class="hint">Заполните поля и нажмите кнопку.</div>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBU8S2jzUmbiPLHUe5d4GjW6ZhvfiX4BQ4",
    authDomain: "qwerty-889bc.firebaseapp.com",
    projectId: "qwerty-889bc",
    storageBucket: "qwerty-889bc.firebasestorage.app",
    messagingSenderId: "899241468202",
    appId: "1:899241468202:web:f2f0cf7c0fa36414427e53",
    measurementId: "G-25RLR6EB83"
  };

  const app = initializeApp(firebaseConfig);

  // ПИШЕМ В aleoy (если хочешь в default — убери "aleoy")
  const db = getFirestore(app, "aleoy");

  const form = document.getElementById("regForm");
  const statusEl = document.getElementById("status");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    statusEl.textContent = "Отправка...";

    const name = form.elements.name.value.trim();
    const email = form.elements.email.value.trim().toLowerCase();

    try {
      const docRef = await addDoc(collection(db, "registrations"), {
        name,
        email,
        createdAt: serverTimestamp()
      });

      console.log("Saved:", docRef.id);
      statusEl.textContent = "Сохранено! id: " + docRef.id;
      form.reset();
    } catch (err) {
      console.error(err);
      statusEl.textContent = "Ошибка: " + err.message;
    }
  });
</script>
</body>
</html>
