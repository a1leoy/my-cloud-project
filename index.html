<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DM (Email/Pass + Google) + Avatars + User Likes</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:#f3f4f6; padding:20px; }
    .center { min-height: calc(100vh - 40px); display:grid; place-items:center; }
    .card { width:100%; max-width:980px; background:#fff; border-radius:14px; padding:16px; box-shadow:0 12px 30px rgba(0,0,0,.10); }

    h2 { margin:0 0 10px; font-size:18px; }
    .topline { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; }
    .badge { font-size:12px; color:#6b7280; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input { padding:10px 12px; border:1px solid #d1d5db; border-radius:10px; outline:none; width:240px; max-width:100%; }
    input:focus { border-color:#2563eb; box-shadow:0 0 0 4px rgba(37,99,235,.15); }
    button { padding:10px 12px; border:0; border-radius:10px; background:#2563eb; color:#fff; cursor:pointer; }
    button.secondary { background:#e5e7eb; color:#111; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .muted { color:#6b7280; font-size:12px; min-height:16px; margin-top:8px; }
    .section { border:1px solid #e5e7eb; border-radius:12px; padding:12px; margin-top:10px; }

    /* Users list */
    .list { display:grid; gap:8px; margin-top:10px; max-height:520px; overflow:auto; }
    .item {
      padding:10px;
      border:1px solid #e5e7eb;
      border-radius:12px;
      cursor:pointer;
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
    }
    .item:hover { background:#f9fafb; }

    .leftBlock { display:flex; gap:10px; align-items:center; min-width:0; }
    .avatar {
      width:38px; height:38px;
      border-radius:999px;
      object-fit:cover;
      background:#e5e7eb;
      flex: 0 0 auto;
    }
    /* для email/pass — серый кружок без картинки */
    .avatarEmpty {
      width:38px; height:38px;
      border-radius:999px;
      background:#e5e7eb;
      flex: 0 0 auto;
    }

    .textBlock { min-width:0; }
    .textBlock b { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .textBlock small { display:block; color:#6b7280; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:360px; }

    .uActions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; flex:0 0 auto; }
    .pill {
      border:0; padding:6px 10px; border-radius:999px; cursor:pointer;
      background:#e5e7eb; color:#111; font-size:12px;
    }
    .pill:hover { filter: brightness(0.95); }

    /* Chat */
    .chatWrap { display:grid; gap:10px; }
    .msgs { height:520px; overflow:auto; border:1px solid #e5e7eb; border-radius:12px; padding:10px; background:#fff; }
    .msg { margin:6px 0; padding:8px 10px; border-radius:12px; max-width:80%; white-space:pre-wrap; word-break:break-word; }
    .me { background:#dbeafe; margin-left:auto; }
    .them { background:#f3f4f6; margin-right:auto; }
    .msg small { display:block; color:#6b7280; margin-top:4px; font-size:11px; }

    @media (max-width: 860px) {
      input { width:100%; }
      .item { align-items:flex-start; }
      .textBlock small { max-width:220px; }
    }
  </style>
</head>
<body>
  <div class="center">

    <!-- AUTH -->
    <div class="card" id="authCard">
      <div class="topline">
        <h2>Вход / Регистрация</h2>
        <div class="badge" id="conn">—</div>
      </div>

      <div class="section">
        <b>Email + Пароль</b>
        <div class="row" style="margin-top:10px;">
          <input id="name" placeholder="Имя (для регистрации)" />
          <input id="email" placeholder="Email" />
          <input id="password" type="password" placeholder="Пароль (мин. 6)" />
          <button id="btnRegister">Регистрация</button>
          <button id="btnLogin" class="secondary">Вход</button>
        </div>
        <div class="muted">При Email/Пароль аватарки нет (серый кружок).</div>
      </div>

      <div class="section">
        <b>Google</b>
        <div class="row" style="margin-top:10px;">
          <button id="btnGoogle">Войти через Google</button>
        </div>
        <div class="muted">При Google появится аватарка в списке.</div>
      </div>

      <div class="muted" id="authStatus"></div>
    </div>

    <!-- USERS -->
    <div class="card" id="usersCard" style="display:none;">
      <div class="topline">
        <h2>Пользователи</h2>
        <div class="row" style="justify-content:flex-end;">
          <div class="badge" id="meBadge">—</div>
          <button id="btnLogout" class="secondary">Выход</button>
        </div>
      </div>

      <div class="row">
        <input id="userSearch" placeholder="Поиск (имя или email)" />
      </div>
      <div class="muted" id="usersStatus"></div>
      <div class="list" id="usersList"></div>
      <div class="muted">👍/👎 ставятся на пользователя и видны всем (real-time).</div>
    </div>

    <!-- CHAT -->
    <div class="card" id="chatCard" style="display:none;">
      <div class="topline">
        <div>
          <h2 id="chatTitle">Чат</h2>
          <div class="badge" id="chatSub"></div>
        </div>
        <div class="row" style="justify-content:flex-end;">
          <button class="secondary" id="btnBack">← Назад</button>
          <button id="btnLogout2" class="secondary">Выход</button>
        </div>
      </div>

      <div class="chatWrap">
        <div class="msgs" id="msgs"></div>

        <div class="row">
          <input id="text" placeholder="Сообщение..." style="flex:1; width:auto; min-width:240px;" />
          <button id="btnSend" disabled>Отправить</button>
        </div>
        <div class="muted" id="chatStatus">Тест: открой в двух браузерах — сообщения появляются сразу.</div>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getFirestore, doc, setDoc, getDoc, updateDoc,
      collection, addDoc, query, orderBy, onSnapshot,
      serverTimestamp, limit, increment
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    import {
      getAuth, onAuthStateChanged, signOut,
      createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile,
      GoogleAuthProvider, signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    // === ТВОЙ CONFIG ===
    const firebaseConfig = {
      apiKey: "AIzaSyBU8S2jzUmbiPLHUe5d4GjW6ZhvfiX4BQ4",
      authDomain: "qwerty-889bc.firebaseapp.com",
      projectId: "qwerty-889bc",
      storageBucket: "qwerty-889bc.firebasestorage.app",
      messagingSenderId: "899241468202",
      appId: "1:899241468202:web:f2f0cf7c0fa36414427e53",
      measurementId: "G-25RLR6EB83"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app, "aleoy"); // твоя база
    const auth = getAuth(app);

    const el = (id) => document.getElementById(id);
    const setText = (node, t) => { node.textContent = t || ""; };
    const uidPairId = (a, b) => [a, b].sort().join("_");

    // Cards
    const authCard = el("authCard");
    const usersCard = el("usersCard");
    const chatCard = el("chatCard");

    // Auth UI
    const conn = el("conn");
    const authStatus = el("authStatus");
    const nameEl = el("name");
    const emailEl = el("email");
    const passEl = el("password");
    const btnRegister = el("btnRegister");
    const btnLogin = el("btnLogin");
    const btnGoogle = el("btnGoogle");

    // Users UI
    const meBadge = el("meBadge");
    const usersStatus = el("usersStatus");
    const usersList = el("usersList");
    const userSearch = el("userSearch");
    const btnLogout = el("btnLogout");
    const btnLogout2 = el("btnLogout2");

    // Chat UI
    const chatTitle = el("chatTitle");
    const chatSub = el("chatSub");
    const chatStatus = el("chatStatus");
    const btnBack = el("btnBack");
    const msgsEl = el("msgs");
    const textEl = el("text");
    const btnSend = el("btnSend");

    // State
    let me = null;
    let usersCache = [];
    let activeConvId = null;
    let activePeerUid = null;
    let unsubUsers = null;
    let unsubMsgs = null;

    function showAuth() {
      authCard.style.display = "";
      usersCard.style.display = "none";
      chatCard.style.display = "none";
    }
    function showUsers() {
      authCard.style.display = "none";
      usersCard.style.display = "";
      chatCard.style.display = "none";
    }
    function showChat() {
      authCard.style.display = "none";
      usersCard.style.display = "none";
      chatCard.style.display = "";
    }

    function isGoogleUser(user) {
      return (user?.providerData || []).some(p => p.providerId === "google.com");
    }

    function renderUsers() {
      const q = userSearch.value.trim().toLowerCase();
      usersList.innerHTML = "";

      const filtered = usersCache.filter(u => {
        const hay = (u.name + " " + u.email).toLowerCase();
        return !q || hay.includes(q);
      });

      setText(usersStatus, filtered.length ? `Пользователей: ${filtered.length}` : "Никого не найдено.");

      for (const u of filtered) {
        const item = document.createElement("div");
        item.className = "item";

        const left = document.createElement("div");
        left.className = "leftBlock";

        // Аватар: только если есть photoURL (обычно Google)
        if (u.photoURL) {
          const img = document.createElement("img");
          img.className = "avatar";
          img.src = u.photoURL;
          img.alt = "avatar";
          img.onerror = () => {
            img.remove();
            const empty = document.createElement("div");
            empty.className = "avatarEmpty";
            left.prepend(empty);
          };
          left.appendChild(img);
        } else {
          const empty = document.createElement("div");
          empty.className = "avatarEmpty";
          left.appendChild(empty);
        }

        const text = document.createElement("div");
        text.className = "textBlock";
        text.innerHTML = `<b>${u.name || "(без имени)"}</b><small>${u.email || u.uid}</small>`;
        left.appendChild(text);

        const actions = document.createElement("div");
        actions.className = "uActions";

        const likeBtn = document.createElement("button");
        likeBtn.className = "pill";
        likeBtn.textContent = `👍 ${u.likes ?? 0}`;
        likeBtn.onclick = async (ev) => {
          ev.stopPropagation();
          await reactToUser(u.uid, "likes");
        };

        const dislikeBtn = document.createElement("button");
        dislikeBtn.className = "pill";
        dislikeBtn.textContent = `👎 ${u.dislikes ?? 0}`;
        dislikeBtn.onclick = async (ev) => {
          ev.stopPropagation();
          await reactToUser(u.uid, "dislikes");
        };

        actions.appendChild(likeBtn);
        actions.appendChild(dislikeBtn);

        item.appendChild(left);
        item.appendChild(actions);

        item.onclick = () => openChatWithUser(u.uid, u.name, u.email);

        usersList.appendChild(item);
      }
    }

    async function reactToUser(uid, field) {
      try {
        await updateDoc(doc(db, "users", uid), { [field]: increment(1) });
      } catch (e) {
        console.error(e);
        alert("Не удалось поставить реакцию (Rules): " + (e.code || e.message));
      }
    }

    userSearch.addEventListener("input", renderUsers);

    // === Email/Pass registration ===
    btnRegister.onclick = async () => {
      const name = nameEl.value.trim();
      const email = emailEl.value.trim().toLowerCase();
      const pass = passEl.value;

      if (name.length < 2) return setText(authStatus, "Имя слишком короткое.");
      if (!email.includes("@")) return setText(authStatus, "Проверь email.");
      if (!pass || pass.length < 6) return setText(authStatus, "Пароль минимум 6 символов.");

      setText(authStatus, "Регистрация...");
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });

        // создаём профиль без photoURL (для email/pass)
        await setDoc(doc(db, "users", cred.user.uid), {
          email,
          name,
          photoURL: "",
          authProvider: "password",
          likes: 0,
          dislikes: 0,
          createdAt: serverTimestamp()
        }, { merge: true });

        setText(authStatus, "Готово ✅");
      } catch (e) {
        console.error(e);
        setText(authStatus, "Ошибка: " + (e.code || e.message));
      }
    };

    // === Email/Pass login ===
    btnLogin.onclick = async () => {
      const email = emailEl.value.trim().toLowerCase();
      const pass = passEl.value;

      setText(authStatus, "Вход...");
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        setText(authStatus, "Вошли ✅");
      } catch (e) {
        console.error(e);
        setText(authStatus, "Ошибка: " + (e.code || e.message));
      }
    };

    // === Google sign-in ===
    btnGoogle.onclick = async () => {
      setText(authStatus, "Вход через Google...");
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
        setText(authStatus, "Вошли ✅");
      } catch (e) {
        console.error(e);
        setText(authStatus, "Ошибка Google-входа: " + (e.code || e.message));
      }
    };

    const doLogout = async () => signOut(auth);
    btnLogout.onclick = doLogout;
    btnLogout2.onclick = doLogout;

    btnBack.onclick = () => {
      if (unsubMsgs) unsubMsgs();
      unsubMsgs = null;
      activeConvId = null;
      activePeerUid = null;
      msgsEl.innerHTML = "";
      btnSend.disabled = true;
      textEl.value = "";
      setText(chatStatus, "");
      showUsers();
    };

    onAuthStateChanged(auth, async (user) => {
      me = user || null;

      if (unsubUsers) unsubUsers();
      if (unsubMsgs) unsubMsgs();
      unsubUsers = null;
      unsubMsgs = null;

      usersCache = [];
      usersList.innerHTML = "";
      msgsEl.innerHTML = "";
      btnSend.disabled = true;
      activeConvId = null;
      activePeerUid = null;

      if (!me) {
        showAuth();
        setText(conn, "Вы не вошли");
        return;
      }

      setText(conn, "Онлайн");
      setText(meBadge, `Вы: ${me.email || me.uid}`);
      showUsers();

      // === гарантируем профиль users/{uid} для ЛЮБОГО способа входа ===
      const myRef = doc(db, "users", me.uid);
      const mySnap = await getDoc(myRef);

      const g = isGoogleUser(me);
      const providerName = g ? "google" : "password";

      // имя: при google обычно есть displayName; при password может быть пусто -> берём из базы
      const existing = mySnap.exists() ? mySnap.data() : {};
      const name = (me.displayName && me.displayName.trim()) ? me.displayName.trim()
                 : (existing.name || (me.email ? me.email.split("@")[0] : "User"));

      const profileBase = {
        email: me.email || "",
        name,
        photoURL: g ? (me.photoURL || existing.photoURL || "") : "", // только Google
        authProvider: providerName
      };

      if (!mySnap.exists()) {
        await setDoc(myRef, {
          ...profileBase,
          likes: 0,
          dislikes: 0,
          createdAt: serverTimestamp()
        }, { merge: true });
      } else {
        // Обновляем только базовые поля (не трогаем likes/dislikes)
        await setDoc(myRef, profileBase, { merge: true });
      }

      // === Список пользователей (real-time) ===
      const usersQ = query(collection(db, "users"), orderBy("name", "asc"), limit(500));
      unsubUsers = onSnapshot(usersQ, (snap) => {
        usersCache = [];
        snap.forEach((d) => {
          if (d.id === me.uid) return;
          const u = d.data();
          usersCache.push({
            uid: d.id,
            name: (u.name || "").toString(),
            email: (u.email || "").toString(),
            photoURL: (u.photoURL || "").toString(),
            likes: typeof u.likes === "number" ? u.likes : 0,
            dislikes: typeof u.dislikes === "number" ? u.dislikes : 0
          });
        });
        renderUsers();
      }, (err) => {
        console.error(err);
        setText(usersStatus, "Ошибка списка пользователей: " + err.message);
      });
    });

    async function openChatWithUser(peerUid, peerName, peerEmail) {
      if (!me) return;

      showChat();
      btnSend.disabled = true;
      msgsEl.innerHTML = "";
      textEl.value = "";
      setText(chatTitle, peerName ? `Чат с: ${peerName}` : "Чат");
      setText(chatSub, peerEmail || peerUid);
      setText(chatStatus, "Открываем чат...");

      try {
        const convId = uidPairId(me.uid, peerUid);
        const convRef = doc(db, "conversations", convId);

        const convSnap = await getDoc(convRef);
        if (!convSnap.exists()) {
          await setDoc(convRef, {
            participants: [me.uid, peerUid],
            updatedAt: serverTimestamp(),
            lastMessage: ""
          });
        }

        activeConvId = convId;
        activePeerUid = peerUid;

        if (unsubMsgs) unsubMsgs();

        const msgQ = query(
          collection(db, "conversations", convId, "messages"),
          orderBy("createdAt", "asc"),
          limit(300)
        );

        unsubMsgs = onSnapshot(
          msgQ,
          (snap) => {
            msgsEl.innerHTML = "";
            snap.forEach((m) => {
              const data = m.data();
              const div = document.createElement("div");
              div.className = "msg " + (data.from === me.uid ? "me" : "them");
              div.textContent = data.text || "";
              const t = document.createElement("small");
              t.textContent = data.createdAt?.toDate ? data.createdAt.toDate().toLocaleString() : "…";
              div.appendChild(t);
              msgsEl.appendChild(div);
            });
            msgsEl.scrollTop = msgsEl.scrollHeight;
            btnSend.disabled = false;
            setText(chatStatus, "");
          },
          (err) => {
            console.error(err);
            setText(chatStatus, "Ошибка чтения сообщений: " + err.message);
          }
        );

      } catch (e) {
        console.error(e);
        alert("Чат не открылся: " + (e.code || e.message));
        showUsers();
      }
    }

    btnSend.onclick = async () => {
      if (!me || !activeConvId || !activePeerUid) return;

      const text = textEl.value.trim();
      if (!text) return;

      btnSend.disabled = true;
      setText(chatStatus, "Отправка...");

      try {
        await addDoc(collection(db, "conversations", activeConvId, "messages"), {
          from: me.uid,
          to: activePeerUid,
          text,
          createdAt: serverTimestamp()
        });

        await updateDoc(doc(db, "conversations", activeConvId), {
          updatedAt: serverTimestamp(),
          lastMessage: text
        });

        textEl.value = "";
        setText(chatStatus, "");
      } catch (e) {
        console.error(e);
        alert("Ошибка отправки (Rules?): " + (e.code || e.message));
        setText(chatStatus, "Ошибка: " + (e.code || e.message));
      } finally {
        btnSend.disabled = false;
      }
    };
  </script>
</body>
</html>
